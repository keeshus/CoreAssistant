name: Build and Release APK

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Default

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_app
        env:
          JAVA_OPTS: "--enable-native-access=ALL-UNNAMED"
        run: |
          # Create a temporary file for the signing key
          if [ -z "${{ secrets.SIGNING_KEY }}" ]; then
            echo "Error: SIGNING_KEY secret is empty. Please check your GitHub repository secrets."
            exit 1
          fi

          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks
          
          # Check if the keystore file was created and is not empty
          if [ ! -s release.jks ]; then
            echo "Error: release.jks is empty. This usually means the SIGNING_KEY secret is not valid base64."
            echo "Please ensure you encoded your keystore with: base64 -w 0 your_keystore.jks"
            exit 1
          fi
          
          # Find the unsigned APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find unsigned APK."
            exit 1
          fi
          SIGNED_APK_PATH="${APK_PATH%.apk}-signed.apk"
          
          # Sign the APK using apksigner (using newer build-tools 36.1.0)
          ${ANDROID_HOME}/build-tools/36.1.0/apksigner sign \
            --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED_APK_PATH" \
            "$APK_PATH"
          
          # Clean up the signing key
          rm release.jks
          
          # Set output for the next step
          echo "signedReleaseFile=$SIGNED_APK_PATH" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
